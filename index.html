<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RunPace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      background: linear-gradient(160deg, #e8f0fe 0%, #dbeafe 50%, #eff6ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.25rem 1rem 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: rgba(255, 255, 255, 0.82);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow:
        0 2px 4px rgba(0, 82, 204, 0.04),
        0 8px 24px rgba(0, 82, 204, 0.08),
        0 32px 64px rgba(0, 82, 204, 0.10);
      padding: 1.75rem 1.75rem 1.5rem;
      width: 100%;
      max-width: 360px;
      margin-top: 1rem;
    }

    .app-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #6b9ef0;
      text-align: center;
      margin-bottom: 1.25rem;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      background: rgba(0, 82, 204, 0.07);
      border-radius: 11px;
      padding: 3px;
      margin-bottom: 1.5rem;
    }

    .tab-bar button {
      flex: 1;
      padding: 0.45rem 0.25rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #5a7db5;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .tab-bar button.active {
      background: white;
      color: #1a56c4;
      font-weight: 600;
      box-shadow: 0 1px 6px rgba(0, 82, 204, 0.14);
    }

    /* ── Calculator tab ── */
    /* Mode toggle */
    .toggle {
      display: flex;
      background: rgba(0, 82, 204, 0.07);
      border-radius: 11px;
      padding: 3px;
      margin-bottom: 1.5rem;
    }

    .toggle button {
      flex: 1;
      padding: 0.45rem 0.25rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #5a7db5;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .toggle button.active {
      background: white;
      color: #1a56c4;
      font-weight: 600;
      box-shadow: 0 1px 6px rgba(0, 82, 204, 0.14);
    }

    /* Display */
    .display {
      background: linear-gradient(135deg, rgba(235, 243, 255, 0.8) 0%, rgba(219, 234, 254, 0.6) 100%);
      border: 1px solid rgba(147, 197, 253, 0.4);
      border-radius: 18px;
      padding: 1.25rem 1.5rem 1rem;
      margin-bottom: 0.75rem;
    }

    .display-input {
      font-size: 3rem;
      font-weight: 300;
      color: #0f2d6e;
      letter-spacing: -0.02em;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
    }

    .display-input .cursor {
      display: inline-block;
      width: 2px;
      height: 2.4rem;
      background: #2563eb;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
      border-radius: 2px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .display-input .placeholder {
      color: rgba(37, 99, 235, 0.2);
      font-weight: 300;
    }

    .display-unit {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #93b4e8;
      margin-top: 0.25rem;
    }

    .display-result {
      font-size: 0.9rem;
      color: #4a7ab5;
      padding: 0.6rem 0.5rem;
      margin-bottom: 1rem;
      min-height: 2rem;
      text-align: center;
    }

    .display-result span {
      font-weight: 700;
      font-size: 1.35rem;
      color: #1a56c4;
      letter-spacing: -0.01em;
    }

    .display-result.empty {
      color: rgba(100, 149, 210, 0.5);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    /* Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.55rem;
    }

    .numpad button {
      padding: 1rem;
      border: none;
      border-radius: 14px;
      background: white;
      font-size: 1.2rem;
      font-weight: 400;
      color: #1a3a6e;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.1s ease, box-shadow 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      box-shadow: 0 1px 3px rgba(0, 60, 180, 0.08), 0 1px 2px rgba(0, 60, 180, 0.04);
    }

    .numpad button:hover   { background: #f0f7ff; box-shadow: 0 2px 8px rgba(0,80,200,0.12); }
    .numpad button:active  { background: #dbeafe; transform: scale(0.94); box-shadow: none; }

    .numpad button.btn-special {
      background: rgba(219, 234, 254, 0.6);
      font-size: 1rem;
      font-weight: 500;
      color: #2563eb;
      box-shadow: none;
    }
    .numpad button.btn-special:hover { background: #dbeafe; }

    .numpad button.btn-clear {
      background: rgba(254, 226, 226, 0.5);
      color: #dc2626;
      box-shadow: none;
    }
    .numpad button.btn-clear:hover { background: rgba(254, 202, 202, 0.7); }

    /* ── Dashboard tab ── */
    .dash-hint {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(100, 149, 210, 0.7);
      padding: 0.25rem 0 1rem;
      letter-spacing: 0.01em;
    }

    .dist-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .dist-card {
      background: linear-gradient(135deg, rgba(235,243,255,0.7) 0%, rgba(219,234,254,0.45) 100%);
      border: 1px solid rgba(147, 197, 253, 0.35);
      border-radius: 16px;
      padding: 0.9rem 1.1rem;
    }

    .dist-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.55rem;
    }

    .dist-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a3a6e;
    }

    .dist-sub {
      font-size: 0.7rem;
      color: #93b4e8;
      margin-left: 0.4rem;
    }

    .dist-pred {
      font-size: 1.15rem;
      font-weight: 300;
      color: #1a56c4;
      letter-spacing: -0.01em;
    }

    .dist-pred.empty {
      color: rgba(100, 149, 210, 0.3);
      font-size: 0.9rem;
    }

    .dist-divider {
      height: 1px;
      background: rgba(147, 197, 253, 0.3);
      margin-bottom: 0.55rem;
    }

    .dist-goal-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .goal-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #93b4e8;
      white-space: nowrap;
    }

    .goal-input {
      flex: 1;
      border: 1px solid rgba(147, 197, 253, 0.5);
      border-radius: 8px;
      background: rgba(255,255,255,0.7);
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
      font-family: inherit;
      color: #1a3a6e;
      outline: none;
      min-width: 0;
      transition: border-color 0.15s;
    }

    .goal-input:focus {
      border-color: #60a5fa;
      background: white;
    }

    .goal-input::placeholder {
      color: rgba(100, 149, 210, 0.4);
    }

    .goal-result {
      font-size: 0.75rem;
      font-weight: 500;
      color: #2563eb;
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }

    .goal-result.empty {
      color: transparent;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <p class="app-title">RunPace</p>

    <div class="tab-bar">
      <button id="tabBtnCalc" class="active" onclick="switchTab('calc')">Kalkulator</button>
      <button id="tabBtnDash" onclick="switchTab('dash')">Dashboard</button>
    </div>

    <!-- ── Calculator tab ── -->
    <div id="tabCalc">
      <div class="toggle">
        <button id="btnPaceMode" class="active" onclick="setMode('pace')">min/km → km/h</button>
        <button id="btnSpeedMode" onclick="setMode('speed')">km/h → min/km</button>
      </div>

      <div class="display">
        <div class="display-input" id="displayInput">
          <span class="placeholder" id="placeholder">–</span>
          <span class="cursor" id="cursor" style="display:none"></span>
        </div>
        <div class="display-unit" id="displayUnit">min/km</div>
      </div>

      <div class="display-result empty" id="result">Skriv inn en verdi</div>

      <div class="numpad">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button id="btnSeparator" class="btn-special" onclick="pressSeparator()">C</button>
        <button onclick="press('0')">0</button>
        <button class="btn-special btn-clear" onclick="backspace()">⌫</button>
      </div>
    </div>

    <!-- ── Dashboard tab ── -->
    <div id="tabDash" class="hidden">
      <p class="dash-hint" id="dashHint">Legg inn en fart i kalkulatoren for å se prognoser</p>
      <div class="dist-list" id="distList"></div>
    </div>
  </div>

  <script>
    // ── Distances ──
    const DISTANCES = [
      { id: 'mile', name: '1 mile',      km: 1.60934  },
      { id: '3k',   name: '3 000 m',     km: 3        },
      { id: '5k',   name: '5 000 m',     km: 5        },
      { id: '10k',  name: '10 km',       km: 10       },
      { id: 'half', name: 'Halvmaraton', km: 21.0975  },
      { id: 'full', name: 'Maraton',     km: 42.195   },
    ];

    // ── Calculator state ──
    let mode  = 'pace';
    let value = '';

    // ── Tab switching ──
    function switchTab(tab) {
      document.getElementById('tabCalc').classList.toggle('hidden', tab !== 'calc');
      document.getElementById('tabDash').classList.toggle('hidden', tab !== 'dash');
      document.getElementById('tabBtnCalc').classList.toggle('active', tab === 'calc');
      document.getElementById('tabBtnDash').classList.toggle('active', tab === 'dash');
      if (tab === 'dash') updateDashboard();
    }

    // ── Calculator ──
    function setMode(m) {
      mode  = m;
      value = '';
      document.getElementById('btnPaceMode').classList.toggle('active', m === 'pace');
      document.getElementById('btnSpeedMode').classList.toggle('active', m === 'speed');
      document.getElementById('displayUnit').textContent = m === 'pace' ? 'min/km' : 'km/h';
      const sep = document.getElementById('btnSeparator');
      if (m === 'pace') {
        sep.textContent = 'C';
        sep.classList.add('btn-clear');
      } else {
        sep.textContent = '.';
        sep.classList.remove('btn-clear');
      }
      updateDisplay();
      updateResult();
    }

    function press(char) {
      if (mode === 'pace') {
        if (value.length >= 3) return;
      } else {
        if (char === '.') return;
        if (value.length >= 5) return;
      }
      value += char;
      updateDisplay();
      updateResult();
    }

    function pressSeparator() {
      if (mode === 'pace') {
        value = '';
      } else {
        if (value.includes('.')) return;
        if (value === '') value = '0';
        value += '.';
      }
      updateDisplay();
      updateResult();
    }

    function backspace() {
      value = value.slice(0, -1);
      updateDisplay();
      updateResult();
    }

    function formatPaceDisplay(digits) {
      if (digits.length === 0) return '';
      if (digits.length === 1) return digits;
      return digits[0] + ':' + digits.slice(1).padEnd(2, ' ').trimEnd();
    }

    function updateDisplay() {
      const inputEl     = document.getElementById('displayInput');
      const placeholder = document.getElementById('placeholder');
      const cursor      = document.getElementById('cursor');
      const displayValue = mode === 'pace' ? formatPaceDisplay(value) : value;
      if (value === '') {
        placeholder.style.display = '';
        cursor.style.display = 'none';
        if (inputEl.childNodes[0]) inputEl.childNodes[0].textContent = '–';
      } else {
        placeholder.style.display = 'none';
        cursor.style.display = '';
        let textNode = inputEl.childNodes[0];
        if (!textNode || textNode.nodeType !== 3) {
          textNode = document.createTextNode('');
          inputEl.insertBefore(textNode, cursor);
        }
        textNode.textContent = displayValue;
      }
    }

    function updateResult() {
      const resultEl = document.getElementById('result');
      const pace = getCurrentPaceMinPerKm();
      if (pace === null) {
        if (value === '' || value === '0' || value === '0.') {
          resultEl.innerHTML = 'Skriv inn en verdi';
        } else {
          resultEl.innerHTML = 'Fortsett å taste…';
        }
        resultEl.className = 'display-result empty';
        return;
      }
      if (mode === 'pace') {
        const kmh = 60 / pace;
        resultEl.innerHTML = `= <span>${kmh.toFixed(2)} km/h</span>`;
      } else {
        resultEl.innerHTML = `= <span>${formatPaceMinKm(pace)} min/km</span>`;
      }
      resultEl.className = 'display-result';
    }

    // Returns current pace in min/km, or null
    function getCurrentPaceMinPerKm() {
      if (mode === 'pace') {
        return parsePaceDigits(value);
      } else {
        const speed = parseFloat(value);
        if (isNaN(speed) || speed <= 0) return null;
        return 60 / speed;
      }
    }

    function parsePaceDigits(digits) {
      if (!digits || digits.length === 0) return null;
      const mins = parseInt(digits[0], 10);
      if (digits.length === 1) return mins > 0 ? mins : null;
      const secStr = digits.slice(1).padEnd(2, '0');
      const secs   = parseInt(secStr, 10);
      if (secs >= 60) return null;
      const total = mins + secs / 60;
      return total > 0 ? total : null;
    }

    function formatPaceMinKm(totalMinutes) {
      const mins = Math.floor(totalMinutes);
      const secs = Math.round((totalMinutes - mins) * 60);
      if (secs === 60) return `${mins + 1}:00`;
      return `${mins}:${String(secs).padStart(2, '0')}`;
    }

    // Format total minutes as H:MM:SS (or MM:SS if under 60 min)
    function formatRaceTime(totalMinutes) {
      const totalSecs = Math.round(totalMinutes * 60);
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    // Parse "H:MM:SS" or "MM:SS" to total minutes, or null
    function parseTimeToMinutes(str) {
      str = str.trim();
      const parts = str.split(':');
      if (parts.length === 2) {
        const m = parseInt(parts[0], 10);
        const s = parseInt(parts[1], 10);
        if (isNaN(m) || isNaN(s) || s >= 60 || m < 0) return null;
        return m + s / 60;
      }
      if (parts.length === 3) {
        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        const s = parseInt(parts[2], 10);
        if (isNaN(h) || isNaN(m) || isNaN(s) || m >= 60 || s >= 60) return null;
        return h * 60 + m + s / 60;
      }
      return null;
    }

    // ── Dashboard ──
    function buildDashboard() {
      const list = document.getElementById('distList');
      list.innerHTML = '';
      DISTANCES.forEach(d => {
        const card = document.createElement('div');
        card.className = 'dist-card';
        card.innerHTML = `
          <div class="dist-top">
            <div>
              <span class="dist-name">${d.name}</span>
              <span class="dist-sub">${d.km < 10 ? d.km.toFixed(3) : d.km.toFixed(2)} km</span>
            </div>
            <span class="dist-pred empty" id="pred-${d.id}">–</span>
          </div>
          <div class="dist-divider"></div>
          <div class="dist-goal-row">
            <span class="goal-label">Mål</span>
            <input class="goal-input" id="gin-${d.id}" placeholder="T:MM:SS"
              oninput="handleTarget('${d.id}', this.value)">
            <span class="goal-result empty" id="gres-${d.id}">–</span>
          </div>`;
        list.appendChild(card);
      });
    }

    function updateDashboard() {
      const pace = getCurrentPaceMinPerKm();
      const hint = document.getElementById('dashHint');
      hint.style.display = pace ? 'none' : '';

      DISTANCES.forEach(d => {
        const predEl = document.getElementById(`pred-${d.id}`);
        if (pace) {
          predEl.textContent  = formatRaceTime(pace * d.km);
          predEl.className    = 'dist-pred';
        } else {
          predEl.textContent  = '–';
          predEl.className    = 'dist-pred empty';
        }
        // Re-evaluate any existing target inputs
        const input = document.getElementById(`gin-${d.id}`);
        if (input && input.value.trim()) handleTarget(d.id, input.value);
      });
    }

    function handleTarget(id, raw) {
      const resEl = document.getElementById(`gres-${id}`);
      const dist  = DISTANCES.find(d => d.id === id);
      const mins  = parseTimeToMinutes(raw);
      if (!mins || mins <= 0 || !dist) {
        resEl.textContent = '';
        resEl.className   = 'goal-result empty';
        return;
      }
      const pace  = mins / dist.km;
      const speed = 60 / pace;
      resEl.textContent = `${formatPaceMinKm(pace)} · ${speed.toFixed(1)} km/h`;
      resEl.className   = 'goal-result';
    }

    // Init
    buildDashboard();

    // Initialise separator button label (pace mode = 'C')
    const sep = document.getElementById('btnSeparator');
    sep.textContent = 'C';
    sep.classList.add('btn-clear');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RunPace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* iPhone Calculator palette */
    :root {
      --bg:        #000000;
      --card-bg:   #000000;
      --btn-digit: #333333;
      --btn-fn:    #a5a5a5;
      --btn-op:    #ff9f0a;
      --btn-op-hl: #ffd49a;
      --text:      #ffffff;
      --text-dim:  rgba(255,255,255,0.35);
      --text-fn:   #000000;
      --divider:   rgba(255,255,255,0.1);
      --card-dist: #1c1c1e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.25rem 1rem 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card-bg);
      padding: 1.75rem 1.25rem 1.5rem;
      width: 100%;
      max-width: 360px;
      margin-top: 1rem;
    }

    .app-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--btn-op);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ── Segmented control (shared) ── */
    .seg {
      display: flex;
      background: #1c1c1e;
      border-radius: 11px;
      padding: 3px;
      margin-bottom: 1.5rem;
    }
    .seg button {
      flex: 1;
      padding: 0.45rem 0.25rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }
    .seg button.active {
      background: var(--btn-op);
      color: #000;
      font-weight: 600;
    }

    /* ── Calculator display ── */
    .display {
      padding: 0.5rem 0.25rem 0.5rem;
      margin-bottom: 0.5rem;
      text-align: right;
    }
    .display-input {
      font-size: 3.5rem;
      font-weight: 200;
      color: var(--text);
      letter-spacing: -0.02em;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .display-input .cursor {
      display: inline-block;
      width: 2px;
      height: 2.8rem;
      background: var(--btn-op);
      margin-left: 3px;
      animation: blink 1s step-end infinite;
      border-radius: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .display-input .placeholder { color: var(--text-dim); font-weight: 200; }
    .display-unit {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 0.2rem;
    }
    .display-result {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      padding: 0.5rem 0.25rem;
      margin-bottom: 1rem;
      min-height: 2rem;
      text-align: right;
    }
    .display-result span {
      font-weight: 400;
      font-size: 1.3rem;
      color: var(--btn-op);
      letter-spacing: -0.01em;
    }
    .display-result.empty { color: var(--text-dim); font-size: 0.8rem; }

    /* ── Numpad ── */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 0.75rem;
    }
    .numpad button {
      padding: 0;
      aspect-ratio: 1;
      border: none;
      border-radius: 50%;
      background: var(--btn-digit);
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      transition: filter 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .numpad button:hover  { filter: brightness(1.25); }
    .numpad button:active { filter: brightness(1.6); }

    /* Function buttons (C, ⌫) — light grey like AC/% */
    .numpad button.btn-special {
      background: var(--btn-fn);
      color: var(--text-fn);
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Clear button uses operator orange */
    .numpad button.btn-clear {
      background: var(--btn-op);
      color: #000;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* ── Dashboard ── */
    .dash-hint {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      padding: 0 0 1.1rem;
    }

    .dist-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .dist-card {
      background: var(--card-dist);
      border-radius: 18px;
      overflow: hidden;
    }

    .dist-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
    }
    .dist-name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .dist-sub  { font-size: 0.68rem; color: rgba(255,255,255,0.35); margin-left: 0.35rem; }
    .dist-pred { font-size: 1.1rem; font-weight: 300; color: var(--btn-op); letter-spacing: -0.01em; }
    .dist-pred.empty { color: rgba(255,255,255,0.2); font-size: 0.85rem; }

    .dist-divider { height: 1px; background: var(--divider); margin: 0 1.1rem; }

    /* ── Picker ── */
    .picker-section {
      padding: 0.5rem 0 0.7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .picker-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .picker-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0;
      height: 120px;
    }

    /* Selection highlight bar */
    .picker-wrap::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 40px;
      height: 40px;
      background: rgba(255,159,10,0.12);
      border-radius: 10px;
      pointer-events: none;
      z-index: 1;
    }
    /* Fade top/bottom */
    .picker-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 0; bottom: 0;
      background:
        linear-gradient(to bottom, rgba(28,28,30,0.9) 0%, transparent 33%, transparent 67%, rgba(28,28,30,0.9) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .picker-wheel {
      height: 120px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
      position: relative;
      z-index: 0;
    }
    .picker-wheel::-webkit-scrollbar { display: none; }

    .picker-wheel.w-h  { width: 36px; }
    .picker-wheel.w-ms { width: 50px; }

    .picker-spacer { height: 40px; flex-shrink: 0; }

    .picker-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
      scroll-snap-align: center;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }

    .picker-sep {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
      padding: 0 3px;
      position: relative;
      z-index: 3;
      user-select: none;
    }

    .picker-result {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--btn-op);
      letter-spacing: 0.01em;
      min-height: 1.1rem;
    }
    .picker-result.empty { color: transparent; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <p class="app-title">RunPace</p>

    <div class="seg" id="tabBar">
      <button id="tabBtnCalc" class="active" onclick="switchTab('calc')">Kalkulator</button>
      <button id="tabBtnDash" onclick="switchTab('dash')">Dashboard</button>
    </div>

    <!-- ── Calculator tab ── -->
    <div id="tabCalc">
      <div class="seg">
        <button id="btnPaceMode" class="active" onclick="setMode('pace')">min/km → km/h</button>
        <button id="btnSpeedMode" onclick="setMode('speed')">km/h → min/km</button>
      </div>

      <div class="display">
        <div class="display-input" id="displayInput">
          <span class="placeholder" id="placeholder">–</span>
          <span class="cursor" id="cursor" style="display:none"></span>
        </div>
        <div class="display-unit" id="displayUnit">min/km</div>
      </div>

      <div class="display-result empty" id="result">Skriv inn en verdi</div>

      <div class="numpad">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button id="btnSeparator" class="btn-special btn-clear" onclick="pressSeparator()">C</button>
        <button onclick="press('0')">0</button>
        <button class="btn-special btn-clear" onclick="backspace()">⌫</button>
      </div>
    </div>

    <!-- ── Dashboard tab ── -->
    <div id="tabDash" class="hidden">
      <p class="dash-hint" id="dashHint">Legg inn en fart i kalkulatoren for å se prognoser</p>
      <div class="dist-list" id="distList"></div>
    </div>
  </div>

  <script>
    const ITEM_H = 40;

    const DISTANCES = [
      { id: 'mile', name: '1 mile',      km: 1.60934,  hasHours: false },
      { id: 'd3k',  name: '3 000 m',     km: 3,        hasHours: false },
      { id: 'd5k',  name: '5 000 m',     km: 5,        hasHours: false },
      { id: 'd10k', name: '10 km',       km: 10,       hasHours: true  },
      { id: 'half', name: 'Halvmaraton', km: 21.0975,  hasHours: true  },
      { id: 'full', name: 'Maraton',     km: 42.195,   hasHours: true  },
    ];

    // ── Calculator state ──
    let mode  = 'pace';
    let value = '';

    // ── Tab switching ──
    function switchTab(tab) {
      document.getElementById('tabCalc').classList.toggle('hidden', tab !== 'calc');
      document.getElementById('tabDash').classList.toggle('hidden', tab !== 'dash');
      document.getElementById('tabBtnCalc').classList.toggle('active', tab === 'calc');
      document.getElementById('tabBtnDash').classList.toggle('active', tab === 'dash');
      if (tab === 'dash') updateDashboard();
    }

    // ── Calculator ──
    function setMode(m) {
      mode  = m;
      value = '';
      document.getElementById('btnPaceMode').classList.toggle('active', m === 'pace');
      document.getElementById('btnSpeedMode').classList.toggle('active', m === 'speed');
      document.getElementById('displayUnit').textContent = m === 'pace' ? 'min/km' : 'km/h';
      const sep = document.getElementById('btnSeparator');
      sep.textContent = m === 'pace' ? 'C' : '.';
      sep.classList.toggle('btn-clear', m === 'pace');
      updateDisplay();
      updateResult();
    }

    function press(char) {
      if (mode === 'pace') {
        if (value.length >= 3) return;
      } else {
        if (char === '.') return;
        if (value.length >= 5) return;
      }
      value += char;
      updateDisplay();
      updateResult();
    }

    function pressSeparator() {
      if (mode === 'pace') {
        value = '';
      } else {
        if (value.includes('.')) return;
        if (value === '') value = '0';
        value += '.';
      }
      updateDisplay();
      updateResult();
    }

    function backspace() {
      value = value.slice(0, -1);
      updateDisplay();
      updateResult();
    }

    function formatPaceDisplay(digits) {
      if (!digits.length) return '';
      if (digits.length === 1) return digits;
      return digits[0] + ':' + digits.slice(1).padEnd(2, ' ').trimEnd();
    }

    function updateDisplay() {
      const inputEl     = document.getElementById('displayInput');
      const placeholder = document.getElementById('placeholder');
      const cursor      = document.getElementById('cursor');
      const dv = mode === 'pace' ? formatPaceDisplay(value) : value;
      if (!value) {
        placeholder.style.display = '';
        cursor.style.display = 'none';
        if (inputEl.childNodes[0]) inputEl.childNodes[0].textContent = '–';
      } else {
        placeholder.style.display = 'none';
        cursor.style.display = '';
        let tn = inputEl.childNodes[0];
        if (!tn || tn.nodeType !== 3) { tn = document.createTextNode(''); inputEl.insertBefore(tn, cursor); }
        tn.textContent = dv;
      }
    }

    function updateResult() {
      const el   = document.getElementById('result');
      const pace = getCurrentPaceMinPerKm();
      if (pace === null) {
        el.innerHTML  = value && value !== '0' && value !== '0.' ? 'Fortsett å taste…' : 'Skriv inn en verdi';
        el.className  = 'display-result empty';
        return;
      }
      el.innerHTML = mode === 'pace'
        ? `= <span>${(60 / pace).toFixed(2)} km/h</span>`
        : `= <span>${fmtPace(pace)} min/km</span>`;
      el.className = 'display-result';
    }

    function getCurrentPaceMinPerKm() {
      if (mode === 'pace') return parsePaceDigits(value);
      const s = parseFloat(value);
      return (!isNaN(s) && s > 0) ? 60 / s : null;
    }

    function parsePaceDigits(digits) {
      if (!digits || !digits.length) return null;
      const mins = parseInt(digits[0], 10);
      if (digits.length === 1) return mins > 0 ? mins : null;
      const secs = parseInt(digits.slice(1).padEnd(2,'0'), 10);
      if (secs >= 60) return null;
      const t = mins + secs / 60;
      return t > 0 ? t : null;
    }

    function fmtPace(totalMin) {
      const m = Math.floor(totalMin);
      const s = Math.round((totalMin - m) * 60);
      if (s === 60) return `${m+1}:00`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function fmtRaceTime(totalMin) {
      const ts = Math.round(totalMin * 60);
      const h  = Math.floor(ts / 3600);
      const m  = Math.floor((ts % 3600) / 60);
      const s  = ts % 60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    // ── Dashboard ──
    function buildDashboard() {
      const list = document.getElementById('distList');
      DISTANCES.forEach(d => {
        const card = document.createElement('div');
        card.className = 'dist-card';

        // Top row
        const top = document.createElement('div');
        top.className = 'dist-top';
        top.innerHTML = `
          <div>
            <span class="dist-name">${d.name}</span>
            <span class="dist-sub">${d.km < 2 ? d.km.toFixed(3) : d.km} km</span>
          </div>
          <span class="dist-pred empty" id="pred-${d.id}">–</span>`;
        card.appendChild(top);

        const divider = document.createElement('div');
        divider.className = 'dist-divider';
        card.appendChild(divider);

        // Picker section
        const section = document.createElement('div');
        section.className = 'picker-section';

        const lbl = document.createElement('p');
        lbl.className = 'picker-label';
        lbl.textContent = 'Måltid';
        section.appendChild(lbl);

        section.appendChild(buildPicker(d.id));

        const res = document.createElement('p');
        res.className = 'picker-result empty';
        res.id = `pres-${d.id}`;
        section.appendChild(res);

        card.appendChild(section);
        list.appendChild(card);
      });
    }

    function buildPicker(distId) {
      const dist = DISTANCES.find(d => d.id === distId);
      const wrap = document.createElement('div');
      wrap.className = 'picker-wrap';

      if (dist.hasHours) {
        // Hours 0–9
        wrap.appendChild(makeWheel(distId, 'h', [...Array(10).keys()].map(i => String(i)), 'w-h'));
        wrap.appendChild(makeSep(':'));
      }
      // Minutes 00–59
      const maxMin = dist.hasHours ? 60 : 99;
      wrap.appendChild(makeWheel(distId, 'm', [...Array(maxMin).keys()].map(i => String(i).padStart(2,'0')), 'w-ms'));
      wrap.appendChild(makeSep(':'));
      // Seconds 00–59
      wrap.appendChild(makeWheel(distId, 's', [...Array(60).keys()].map(i => String(i).padStart(2,'0')), 'w-ms'));

      return wrap;
    }

    function makeWheel(distId, col, items, widthClass) {
      const wheel = document.createElement('div');
      wheel.className = `picker-wheel ${widthClass}`;
      wheel.dataset.distId = distId;
      wheel.dataset.col    = col;

      // Top spacer
      const ts = document.createElement('div');
      ts.className = 'picker-spacer';
      wheel.appendChild(ts);

      items.forEach(item => {
        const el = document.createElement('div');
        el.className   = 'picker-item';
        el.textContent = item;
        wheel.appendChild(el);
      });

      // Bottom spacer
      const bs = document.createElement('div');
      bs.className = 'picker-spacer';
      wheel.appendChild(bs);

      // Snap-on-scroll-end
      let timer;
      wheel.addEventListener('scroll', () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          const idx = Math.round(wheel.scrollTop / ITEM_H);
          wheel.scrollTo({ top: idx * ITEM_H, behavior: 'smooth' });
          updateTargetFromPicker(distId);
        }, 120);
      }, { passive: true });

      return wheel;
    }

    function makeSep(char) {
      const s = document.createElement('span');
      s.className   = 'picker-sep';
      s.textContent = char;
      return s;
    }

    function getWheelValue(distId, col) {
      const wheel = document.querySelector(`.picker-wheel[data-dist-id="${distId}"][data-col="${col}"]`);
      return wheel ? Math.round(wheel.scrollTop / ITEM_H) : 0;
    }

    function updateTargetFromPicker(distId) {
      const dist = DISTANCES.find(d => d.id === distId);
      const h = dist.hasHours ? getWheelValue(distId, 'h') : 0;
      const m = getWheelValue(distId, 'm');
      const s = getWheelValue(distId, 's');

      const resEl = document.getElementById(`pres-${distId}`);
      const totalMin = h * 60 + m + s / 60;

      if (totalMin <= 0 || !dist) {
        resEl.textContent = '';
        resEl.className   = 'picker-result empty';
        return;
      }
      const pace  = totalMin / dist.km;
      const speed = 60 / pace;
      resEl.textContent = `${fmtPace(pace)} min/km · ${speed.toFixed(1)} km/h`;
      resEl.className   = 'picker-result';
    }

    function updateDashboard() {
      const pace = getCurrentPaceMinPerKm();
      document.getElementById('dashHint').style.display = pace ? 'none' : '';
      DISTANCES.forEach(d => {
        const el = document.getElementById(`pred-${d.id}`);
        if (pace) {
          el.textContent = fmtRaceTime(pace * d.km);
          el.className   = 'dist-pred';
        } else {
          el.textContent = '–';
          el.className   = 'dist-pred empty';
        }
      });
    }

    // Init
    buildDashboard();
  </script>
</body>
</html>
